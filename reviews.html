<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reviews</title>
  <link rel="stylesheet" href="style4.css" />
</head>

<body>
  <h2>Customer Reviews</h2>
  <div id="reviews">
    <p><strong>Ramya:</strong> Great quality and fast delivery!</p>
    <p><strong>priya:</strong> Loved the cashews. Will buy again.</p>
  </div>
  <form id="reviewForm">
    <input type="text" placeholder="Your Name" required />
    <textarea placeholder="Your Review" required></textarea>
    <button type="submit">Submit Review</button>
  </form>
  <script>
    // Make sure the DOM is fully loaded before attaching event listeners
    document.addEventListener('DOMContentLoaded', function() {
      const homeBtn = document.getElementById('homeBtn');
      homeBtn.addEventListener('click', function() {
        // Redirect to index.html (make sure this file exists)
        window.location.href = 'index.html';
      });
    });
  </script>
  <button id="homeBtn">Home</button>
  <script src="script.js"></script>
</body>
</html>
